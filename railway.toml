[build]
builder = "RAILPACK"
buildCommand = "SKIP_DATABASE_CONFIG=True python manage.py collectstatic --noinput"

[deploy]
preDeployCommand = "python manage.py migrate --noinput"
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Add a Railway Volume in the dashboard and mount it at /data.
# Then set MEDIA_ROOT=/data/media. Railway's default filesystem is ephemeral.
