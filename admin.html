<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Console — WrenchLink</title>
<link rel="icon" href="assets/img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<nav></nav>

<div class="page">
  <div class="page-head">
    <div class="section-tag">Master Admin Console</div>
    <h1>Platform <em>control</em></h1>
    <p>Full oversight of every employer and technician — profiles, job listings, plans, payment methods, and invoices. Add, edit, and manage any account.</p>
  </div>

  <div class="stat-row" id="admin-stats"></div>

  <div class="app-layout">
    <aside class="app-rail">
      <div class="rail-title">Console</div>
      <div class="rail-group" id="admin-nav">
        <a class="sidebar-item active" data-sec="overview"><span class="icon" data-ic="chart"></span> Overview</a>
        <a class="sidebar-item" data-sec="employers"><span class="icon" data-ic="building"></span> Employers</a>
        <a class="sidebar-item" data-sec="techs"><span class="icon" data-ic="wrench"></span> Technicians</a>
        <a class="sidebar-item" data-sec="billing"><span class="icon" data-ic="card"></span> Subscriptions</a>
        <a class="sidebar-item" data-sec="pools"><span class="icon" data-ic="map"></span> City Pools</a>
      </div>
      <div class="rail-title">Signed in</div>
      <div style="padding:0 0.25rem;"><span class="badge blue">Platform Admin</span></div>
    </aside>
    <main id="admin-main"></main>
  </div>
</div>

<div id="footer"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/billing.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/footer.js"></script>
<script>
renderNav();
renderFooter();

// ---- admin guard (dev mode opens it; otherwise quick admin sign-in) ----
const _u = WL_DEV ? wlDevEnsure('admin') : WL.get().user;
if (!WL_DEV && (!_u || _u.type !== 'admin')) {
  document.querySelector('.page').innerHTML = `
    <div class="page-head"><div class="section-tag">Restricted</div><h1>Admin <em>sign-in</em></h1>
    <p>This is the platform master console. Sign in with an administrator account to continue.</p></div>
    <div class="panel" style="max-width:440px;">
      <div class="form-group"><label class="form-label">Admin Email</label><input class="form-input" id="adm-email" value="admin@wrenchlink.io"></div>
      <div class="form-group" style="margin-top:0.75rem;"><label class="form-label">Password</label><input class="form-input" id="adm-pass" type="password" value="demo"></div>
      <button class="btn-sm" style="margin-top:1rem;" onclick="adminLogin()">Enter Console →</button>
    </div>`;
}
function adminLogin(){
  const e=document.getElementById('adm-email').value.trim().toLowerCase();
  if(e!=='admin@wrenchlink.io'){ showToast('Use admin@wrenchlink.io for the demo.', true); return; }
  WL.set({ user:{ type:'admin', name:'Platform Admin', email:e } });
  location.reload();
}

/* ============================================================

const PLAN_PRICE = { Starter:99, Pro:249, Enterprise:1200 };
function findEmp(id){ return members().employers.find(e=>e.id===id); }
function findTech(id){ return members().techs.find(t=>t.id===id); }
function seedJobsForShop(company){ return WL_SEED_JOBS.filter(j=>j.shop===company); }
function empJobs(m){ return seedJobsForShop(m.company).concat(m.addedJobs||[]); }

function ensureEmpInvoices(m){
  if(!m.invoices){ m.invoices = Billing.genInvoices({ startISO:m.joined, price:m.price, planName:m.plan, hasCard:!!m.paymentMethod, status:m.status }); WL.save(); }
  return m.invoices;
}
function ensureTechInvoices(m){
  if(!m.invoices){ m.invoices = Billing.genInvoices({ startISO:m.joined, price:m.price, planName:'Solo', hasCard:!!m.paymentMethod, status:'active' }); WL.save(); }
  return m.invoices;
}
function regenEmpInvoices(m){ m.invoices=null; ensureEmpInvoices(m); }
function regenTechInvoices(m){ m.invoices=null; ensureTechInvoices(m); }

function money(n){ return Billing.money(n); }
function fmtDate(d){ return Billing.fmtDate(d); }
function statusBadge(st){
  const map = { active:['green','Active'], past_due:['yellow','Past Due'], canceled:['muted','Canceled'], passive:['yellow','Passive'], notlooking:['muted','Off'] };
  const [c,l] = map[st] || ['muted', st]; return `<span class="badge ${c}">${l}</span>`;
}
function cardLine(pm){ return pm ? `${pm.brand} •••• ${pm.last4} · exp ${pm.exp}` : 'No card on file'; }

/* ============================================================
   STATS + NAV
   ============================================================ */
function renderStats(){
  const m = members();
  const empMrr = m.employers.filter(e=>e.status!=='canceled').reduce((a,e)=>a+e.price,0);
  const techMrr = m.techs.length * 9.95;
  const mrr = empMrr + techMrr;
  const activeSubs = m.employers.filter(e=>e.status==='active').length + m.techs.length;
  document.getElementById('admin-stats').innerHTML = `
    <div class="dash-stat"><div class="num">${m.employers.length + m.techs.length}</div><div class="lbl">Total Members</div></div>
    <div class="dash-stat"><div class="num">${money(Math.round(mrr))}</div><div class="lbl">Monthly Recurring Rev.</div></div>
    <div class="dash-stat"><div class="num">${activeSubs}</div><div class="lbl">Active Subscriptions</div></div>
    <div class="dash-stat"><div class="num">${m.techs.length}</div><div class="lbl">Technician Members</div></div>`;
}
let CURRENT_SEC = 'overview';
document.querySelectorAll('#admin-nav .sidebar-item').forEach(a => a.addEventListener('click', () => {
  document.querySelectorAll('#admin-nav .sidebar-item').forEach(x=>x.classList.remove('active'));
  a.classList.add('active'); renderSection(a.dataset.sec);
}));
function setActiveNav(sec){ document.querySelectorAll('#admin-nav .sidebar-item').forEach(x=>x.classList.toggle('active', x.dataset.sec===sec)); }

/* ============================================================
   SECTION ROUTER
   ============================================================ */
function renderSection(sec){
  CURRENT_SEC = sec;
  const m = members(), main = document.getElementById('admin-main');

  if (sec === 'overview') {
    const empMrr = m.employers.filter(e=>e.status!=='canceled').reduce((a,e)=>a+e.price,0);
    const techMrr = m.techs.length * 9.95;
    const mrr = empMrr + techMrr;
    main.innerHTML = `
      <div class="panel"><div class="panel-head"><h2>Revenue by plan</h2></div>
        <table class="data-table"><thead><tr><th>Plan</th><th>Subscribers</th><th>Unit price</th><th>Plan MRR</th></tr></thead><tbody>
          ${['Starter','Pro','Enterprise'].map(p=>{ const subs=m.employers.filter(e=>e.plan===p&&e.status!=='canceled'); return `<tr><td style="color:var(--text);font-weight:600;">${p} (Employer)</td><td>${subs.length}</td><td>${money(PLAN_PRICE[p])}/mo</td><td style="color:var(--accent);font-weight:700;">${money(subs.length*PLAN_PRICE[p])}</td></tr>`; }).join('')}
          <tr><td style="color:var(--text);font-weight:600;">Solo (Technician)</td><td>${m.techs.length}</td><td>$9.95/mo</td><td style="color:var(--accent);font-weight:700;">${money(Math.round(techMrr))}</td></tr>
          <tr><td colspan="3" style="text-align:right;color:var(--muted);">Total MRR</td><td style="color:var(--accent);font-weight:800;">${money(Math.round(mrr))}</td></tr>
        </tbody></table></div>
      <div class="panel"><div class="panel-head"><h2>Needs attention</h2></div>
        ${m.employers.filter(e=>e.status==='past_due').map(e=>`<div class="candidate-card"><div class="cand-avatar" style="background:var(--amber);">!</div><div class="cand-info"><div class="cand-name">${escapeHtml(e.company)}</div><div class="cand-role">${e.plan} plan · payment past due · ${money(e.price)}/mo · ${cardLine(e.paymentMethod)}</div></div><div class="cand-actions"><button class="cand-btn" onclick="openEmp('${e.id}')">Open</button><button class="cand-btn primary" onclick="empSetStatus('${e.id}','active',true)">Mark paid</button></div></div>`).join('') || '<p style="color:var(--muted);">All subscriptions in good standing.</p>'}</div>`;
    return;
  }

  if (sec === 'employers') {
    const q=(window._empQ||'').toLowerCase();
    const rows = m.employers.filter(e=>(`${e.company} ${e.type} ${e.metro}`).toLowerCase().includes(q));
    main.innerHTML = `<div class="panel"><div class="panel-head"><h2>Employers (${m.employers.length})</h2>
      <div style="display:flex;gap:0.5rem;"><input class="search-input" id="emp-q" placeholder="Search…" style="max-width:200px;" value="${escapeHtml(window._empQ||'')}" oninput="window._empQ=this.value;renderSection('employers');document.getElementById('emp-q').focus();">
      <button class="btn-sm" onclick="addEmployerForm()">${iconSvg('plus')} Add employer</button></div></div>
      <table class="data-table"><thead><tr><th>Company</th><th>Type</th><th>Pool</th><th>Plan</th><th>MRR</th><th>Jobs</th><th>Status</th><th></th></tr></thead><tbody>
      ${rows.map(e=>`<tr style="cursor:pointer;" onclick="openEmp('${e.id}')">
        <td style="color:var(--text);font-weight:600;">${escapeHtml(e.company)}</td><td>${escapeHtml(e.type)}</td><td>${e.metro}</td>
        <td>${e.plan}</td><td>${money(e.price)}</td><td>${empJobs(e).length}</td><td>${statusBadge(e.status)}</td>
        <td><a class="link-accent" onclick="event.stopPropagation();openEmp('${e.id}')">Manage</a></td></tr>`).join('')}
      </tbody></table></div>`;
    return;
  }

  if (sec === 'techs') {
    const q=(window._techQ||'').toLowerCase();
    const rows = m.techs.filter(t=>(`${t.name} ${t.role} ${t.metro}`).toLowerCase().includes(q));
    main.innerHTML = `<div class="panel"><div class="panel-head"><h2>Technicians (${m.techs.length})</h2>
      <div style="display:flex;gap:0.5rem;"><input class="search-input" id="tech-q" placeholder="Search…" style="max-width:200px;" value="${escapeHtml(window._techQ||'')}" oninput="window._techQ=this.value;renderSection('techs');document.getElementById('tech-q').focus();">
      <button class="btn-sm" onclick="addTechForm()">${iconSvg('plus')} Add technician</button></div></div>
      <table class="data-table"><thead><tr><th>Name</th><th>Role</th><th>Pool</th><th>Availability</th><th>Plan</th><th>Pays</th><th></th></tr></thead><tbody>
      ${rows.map(t=>`<tr style="cursor:pointer;" onclick="openTech('${t.id}')">
        <td style="color:var(--text);font-weight:600;">${escapeHtml(t.name)}</td><td>${escapeHtml(t.role)}</td><td>${t.metro}</td>
        <td>${statusBadge(t.status)}</td><td><span class="badge muted">${t.plan}</span></td><td>${money(t.price)}/mo</td>
        <td><a class="link-accent" onclick="event.stopPropagation();openTech('${t.id}')">Manage</a></td></tr>`).join('')}
      </tbody></table></div>`;
    return;
  }

  if (sec === 'billing') {
    const all = m.employers.filter(e=>e.status!=='canceled');
    main.innerHTML = `<div class="panel"><div class="panel-head"><h2>Subscriptions &amp; billing</h2></div>
      <table class="data-table"><thead><tr><th>Account</th><th>Type</th><th>Plan</th><th>Amount</th><th>Payment method</th><th>Status</th><th></th></tr></thead><tbody>
      ${all.map(e=>`<tr><td style="color:var(--text);font-weight:600;">${escapeHtml(e.company)}</td><td>Employer</td><td>${e.plan}</td><td>${money(e.price)}/mo</td><td>${cardLine(e.paymentMethod)}</td><td>${statusBadge(e.status)}</td><td><a class="link-accent" onclick="openEmp('${e.id}')">View</a></td></tr>`).join('')}
      ${m.techs.map(t=>`<tr><td style="color:var(--text);font-weight:600;">${escapeHtml(t.name)}</td><td>Technician</td><td>Solo</td><td>${money(t.price)}/mo</td><td>${cardLine(t.paymentMethod)}</td><td>${statusBadge('active')}</td><td><a class="link-accent" onclick="openTech('${t.id}')">View</a></td></tr>`).join('')}
      </tbody></table></div>`;
    return;
  }

  if (sec === 'pools') {
    main.innerHTML = `<div class="panel"><div class="panel-head"><h2>City pool activity</h2></div>
      <table class="data-table"><thead><tr><th>City Pool</th><th>Region</th><th>Technicians</th><th>Open Jobs</th><th>Employers</th></tr></thead><tbody>
      ${WL.cities().map(c=>{ const emps=m.employers.filter(e=>e.metro===c.name&&e.status!=='canceled').length; return `<tr><td style="color:var(--text);font-weight:600;">${c.name}, ${c.state}</td><td>${c.region}</td><td>${c.techs}</td><td>${c.jobs}</td><td>${emps}</td></tr>`; }).join('')}
      </tbody></table></div>`;
    return;
  }
}

/* ============================================================
   EMPLOYER DETAIL (full drill-down)
   ============================================================ */
function openEmp(id){ setActiveNav('employers'); renderEmployerDetail(id); window.scrollTo(0,0); }

function renderEmployerDetail(id){
  const e = findEmp(id); if(!e) return renderSection('employers');
  ensureEmpInvoices(e);
  const jobs = empJobs(e);
  const due = e.invoices.filter(i=>i.status==='due').reduce((a,i)=>a+i.amount,0);
  const main = document.getElementById('admin-main');
  main.innerHTML = `
    <a class="link-accent" onclick="renderSection('employers')">← Back to employers</a>
    <div class="panel" style="margin-top:0.75rem;">
      <div class="profile-header">
        <div class="avatar-circle" style="background:${e.color};border-radius:10px;">${e.company.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div class="profile-name"><h3>${escapeHtml(e.company)}</h3><p>${escapeHtml(e.type)} · ${e.metro} pool · member since ${fmtDate(e.joined)}</p>
        <div style="margin-top:0.4rem;display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;">${statusBadge(e.status)}<span class="badge blue">${e.plan} · ${money(e.price)}/mo</span>${due>0?`<span class="badge yellow">${money(due)} due</span>`:''}</div></div>
        <div style="margin-left:auto;display:flex;gap:0.4rem;flex-wrap:wrap;">
          ${e.status==='canceled'?`<button class="btn-sm" onclick="empSetStatus('${e.id}','active')">Reactivate</button>`:`<button class="btn-sm ghost" onclick="empSetStatus('${e.id}','${e.status==='active'?'canceled':'active'}')">${e.status==='active'?'Suspend':'Activate'}</button>`}
          <button class="btn-sm ghost" onclick="empDelete('${e.id}')">Delete</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Business profile</h2></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Company name</label><input class="form-input" id="ep-company" value="${escapeHtml(e.company)}"></div>
        <div class="form-group"><label class="form-label">Shop type</label><select class="form-select" id="ep-type">${['Auto Repair Shop','Auto Body / Collision Shop','Dealership Service Dept.','Fleet Maintenance','Multi-Location Group'].map(t=>`<option ${t===e.type?'selected':''}>${t}</option>`).join('')}</select></div>
      </div>
      <div class="form-row" style="margin-top:0.75rem;">
        <div class="form-group"><label class="form-label">City pool</label><select class="form-select" id="ep-metro">${WL.cities().map(c=>`<option ${c.name===e.metro?'selected':''}>${c.name}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Team size</label><select class="form-select" id="ep-size">${['1–4 employees','5–15 employees','16–40 employees','40+ employees'].map(t=>`<option ${t===e.size?'selected':''}>${t}</option>`).join('')}</select></div>
      </div>
      <div class="form-row" style="margin-top:0.75rem;">
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="ep-phone" value="${escapeHtml(e.phone||'')}"></div>
        <div class="form-group"><label class="form-label">Website</label><input class="form-input" id="ep-web" value="${escapeHtml(e.website||'')}"></div>
      </div>
      <div class="form-group" style="margin-top:0.75rem;"><label class="form-label">Address</label><input class="form-input" id="ep-addr" value="${escapeHtml(e.address||'')}"></div>
      <div class="form-group" style="margin-top:0.75rem;"><label class="form-label">Description</label><textarea class="form-input" id="ep-desc">${escapeHtml(e.description||'')}</textarea></div>
      <div class="form-group" style="margin-top:0.75rem;"><label class="form-label">Perks (comma separated)</label><input class="form-input" id="ep-perks" value="${escapeHtml((e.perks||[]).join(', '))}"></div>
      <button class="btn-sm" style="margin-top:1rem;" onclick="empSaveProfile('${e.id}')">Save profile</button>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Job listings (${jobs.length})</h2><button class="btn-sm" onclick="toggleAddJob('${e.id}')">${iconSvg('plus')} Add job</button></div>
      <div id="add-job-form" style="display:none;margin-bottom:1rem;padding:1rem;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);">
        <div class="form-row"><div class="form-group"><label class="form-label">Title</label><input class="form-input" id="nj-title" placeholder="Master Technician"></div>
          <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="nj-type"><option>Auto Repair</option><option>Auto Body</option></select></div></div>
        <div class="form-row" style="margin-top:0.6rem;grid-template-columns:1fr 1fr 1fr 1fr;">

/* employer mutations */
function empSaveProfile(id){ const e=findEmp(id);
  e.company=document.getElementById('ep-company').value; e.type=document.getElementById('ep-type').value;
  e.metro=document.getElementById('ep-metro').value; e.size=document.getElementById('ep-size').value;
  e.phone=document.getElementById('ep-phone').value; e.website=document.getElementById('ep-web').value;
  e.address=document.getElementById('ep-addr').value; e.description=document.getElementById('ep-desc').value;
  e.perks=document.getElementById('ep-perks').value.split(',').map(s=>s.trim()).filter(Boolean);
  WL.save(); renderEmployerDetail(id); showToast('Employer profile saved.'); }
function empSetPlan(id,plan){ const e=findEmp(id); e.plan=plan; e.price=PLAN_PRICE[plan]; regenEmpInvoices(e); WL.save(); renderStats(); renderEmployerDetail(id); showToast(e.company+' → '+plan+' plan ('+money(e.price)+'/mo).'); }
function empSetStatus(id,st,silent){ const e=findEmp(id); e.status=st; if(st==='active'){ (e.invoices||[]).forEach(i=>{ if(i.status==='due'){ i.status='paid'; i.paidDate=Billing.iso(Billing.now()); } }); } WL.save(); renderStats(); if(silent){ renderSection(CURRENT_SEC); } else { renderEmployerDetail(id); } showToast(e.company+' → '+st.replace('_',' ')+'.'); }
function empDelete(id){ const e=findEmp(id); if(!confirm('Delete '+e.company+'? This removes the account and its records.'))return; const arr=members().employers; arr.splice(arr.findIndex(x=>x.id===id),1); WL.save(); renderStats(); renderSection('employers'); showToast('Employer deleted.'); }
function empSaveCard(id){ const e=findEmp(id); const last4=document.getElementById('ep-last4').value.replace(/\D/g,'').slice(-4); if(!last4){ showToast('Enter the last 4 digits.', true); return; } e.paymentMethod={ brand:document.getElementById('ep-brand').value, last4, exp:document.getElementById('ep-exp').value||'—', name:document.getElementById('ep-cardname').value||e.company }; regenEmpInvoices(e); WL.save(); renderEmployerDetail(id); showToast('Card saved — outstanding invoices settled.'); }
function empRemoveCard(id){ const e=findEmp(id); e.paymentMethod=null; WL.save(); renderEmployerDetail(id); showToast('Card removed.'); }
function empPayInvoice(id,invId){ const e=findEmp(id); const i=e.invoices.find(x=>x.id===invId); if(i){ i.status='paid'; i.paidDate=Billing.iso(Billing.now()); WL.save(); renderEmployerDetail(id); showToast('Invoice '+invId+' marked paid.'); } }
function toggleAddJob(id){ const f=document.getElementById('add-job-form'); f.style.display = f.style.display==='none'?'block':'none'; }
function empAddJob(id){ const e=findEmp(id); const title=document.getElementById('nj-title').value.trim(); if(!title){ showToast('Enter a job title.', true); return; }
  e.addedJobs=e.addedJobs||[]; e.addedJobs.push({ id:'aj'+Date.now(), __added:true, title, type:document.getElementById('nj-type').value, schedule:document.getElementById('nj-sched').value, payMin:+document.getElementById('nj-min').value||0, payMax:+document.getElementById('nj-max').value||0, cert:document.getElementById('nj-cert').value||'Experience Required', exp:0, shop:e.company, city:e.metro+', OH', metro:e.metro, distance:5, color:e.color, logo:e.company.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(), desc:'Posted by '+e.company+'.' });
  WL.save(); renderEmployerDetail(id); showToast('Job added to '+e.company+'.'); }
function empRemoveJob(id,jobId){ const e=findEmp(id); e.addedJobs=(e.addedJobs||[]).filter(j=>j.id!==jobId); WL.save(); renderEmployerDetail(id); showToast('Job removed.'); }

/* mark seed jobs with flag for display */
(function(){ /* seed jobs are not __added; flagged in template via j.__added */ })();

/* technician mutations */
function techSaveProfile(id){ const t=findTech(id);
  t.name=document.getElementById('tp-name').value; t.role=document.getElementById('tp-role').value; t.title=t.role;
  t.exp=+document.getElementById('tp-exp').value||0; t.metro=document.getElementById('tp-metro').value;
  t.phone=document.getElementById('tp-phone').value; t.email=document.getElementById('tp-email').value;
  t.skills=document.getElementById('tp-skills').value.split(',').map(s=>s.trim()).filter(Boolean);
  WL.save(); renderTechDetail(id); showToast('Technician profile saved.'); }
function techSetStatus(id,st){ const t=findTech(id); t.status=st; WL.save(); showToast(t.name+' → '+statusLabel(st)+'.'); }
function techDelete(id){ const t=findTech(id); if(!confirm('Delete '+t.name+'?'))return; const arr=members().techs; arr.splice(arr.findIndex(x=>x.id===id),1); WL.save(); renderStats(); renderSection('techs'); showToast('Technician deleted.'); }
function techSaveCard(id){ const t=findTech(id); const last4=document.getElementById('tp-last4').value.replace(/\D/g,'').slice(-4); if(!last4){ showToast('Enter the last 4 digits.', true); return; } t.paymentMethod={ brand:document.getElementById('tp-brand').value, last4, exp:document.getElementById('tp-exp2').value||'—', name:document.getElementById('tp-cardname').value||t.name }; regenTechInvoices(t); WL.save(); renderTechDetail(id); showToast('Card saved — invoices settled.'); }
function techRemoveCard(id){ const t=findTech(id); t.paymentMethod=null; WL.save(); renderTechDetail(id); showToast('Card removed.'); }
function techPayInvoice(id,invId){ const t=findTech(id); const i=t.invoices.find(x=>x.id===invId); if(i){ i.status='paid'; i.paidDate=Billing.iso(Billing.now()); WL.save(); renderTechDetail(id); showToast('Invoice '+invId+' marked paid.'); } }
